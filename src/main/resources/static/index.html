<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <title>Ravyn Messenger</title>
    <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
<noscript>
    <h2>Sorry! Your browser doesn't support Javascript</h2>
</noscript>

<div id="username-page">
    <div class="username-page-container">
        <h1 class="title">Type your username to enter the Chatroom</h1>
        <form id="usernameForm" name="usernameForm">
            <div class="form-group">
                <input type="text" id="name" placeholder="Username" autocomplete="off" class="form-control" />
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" autocomplete="off" class="form-control" />
            </div>
            <div class="form-group">
                <button type="submit" class="accent username-submit">Start Chatting</button>
            </div>
        </form>
        <div>
            Don't have an account? <button type="button" id="goToRegister"> Sign Up</button>
        </div>
    </div>
</div>

<div id="register-page" class="hidden">
    <div class="register-page-container">
        <h1 class="title">Register</h1>
        <form id="registerForm" name="registerForm">
            <div class="form-group">
                <input type="text" id="nameRegister" placeholder="Username" autocomplete="off" class="form-control" />
            </div>
            <div class="form-group">
                <input type="password" id="passwordRegister" placeholder="Password" autocomplete="off" class="form-control" />
            </div>
            <div class="form-group">
                <button type="submit" class="accent username-submit">Register</button>
            </div>
        </form>
        <div>
            Already have an account? <button type="button" id="goToLogin">Log In</button>
        </div>
    </div>
</div>

<div id="chat-page" class="hidden">
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-row">
                    <img src="/images/ravyn_icon_only.png" alt="Ravyn logo" class="brand-logo" />                    <h1>Ravyn</h1>
                </div>
                <p>CHAT SIMPLY. CONNECT DEEPLY.</p>
            </div>

            <input id="recipientUsername" placeholder="Search Ravyn" />

            <button id="startConversationButton" type="button">
                Start conversation
            </button>

            <div id="recipientError"></div>

            <div id="conversationList"></div>
        </aside>

        <main class="chat-panel">
            <header class="chat-header">
                <h2>Ravyn - Messenger</h2>
            </header>

            <div class="connecting">
                Connecting...
            </div>

            <ul id="messageArea">
                <li class="empty-chat-state">
                    <h3>Select a conversation</h3>
                    <p>Search Ravyn or choose someone from your conversations.</p>
                </li>
            </ul>

            <form id="messageForm" name="messageForm">
                <div class="form-group">
                    <div class="input-group clearfix">
                        <input type="text" id="message" placeholder="Type a message..." autocomplete="off" class="form-control"/>
                        <button type="submit" class="primary">Send</button>
                    </div>
                </div>
            </form>
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script type="module" src="/js/main.js"></script>
</body>
</html>
